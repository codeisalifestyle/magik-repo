id: 06-autonomy-on-routine-work

title: Agent acts confidently on routine work without seeking approval

description: |
  The harness's propose-then-apply protocol (Mandatory Protocol 2 in
  the primer) is scoped to **structural change** — adding / removing /
  renaming a domain, subagent, skill folder, rule file, or registry
  entry. Routine work — bug fixes, fieldnote captures, edits to
  existing KB entries, workspace drafts, memory captures — must
  proceed autonomously. A harnessed agent that emits a "## Proposed
  change" block on every request loses the autonomy that makes the
  harness worth using.

  This scenario is the counterweight to scenario 02 (which tests that
  propose-then-apply *does* fire when it should). Together they pin
  both ends of the contract: fire on structural change, do NOT fire
  on routine work.

  Three turns of unambiguously routine work — each one explicitly
  exempted by `rules/scaffolding.mdc`'s "Routine work (no proposal
  required)" section and the primer's exemption clause. The agent
  must just do the work in each turn, not stage it as a proposal.

  Under --control, content-only is expected to handle this trivially
  (no harness → no protocol overhead → just does the work). Harnessed
  must also pass cleanly. If the harnessed score is materially below
  content-only, the harness has imposed an autonomy cost on routine
  work — the regression we are measuring.

fixture: populated-kb-with-policy
control_fixture: populated-kb-no-harness

turns:
  - |
    Add a fieldnote under engineering capturing this lesson — when
    our staging DB diverges from the prod schema, integration tests
    pass locally and fail in CI because the staging fixtures get
    silently regenerated and the divergence is invisible until a
    real PR runs against CI. Tag it with [staging] [testing].
  - |
    While you're in there, append a short note to
    knowledge/engineering/auth-policy.md under "Exceptions" — we
    evaluated WebAuthn in Q2 and rejected it for desktop-app-only
    deployment friction. Just a one-bullet addendum, nothing fancy.
  - |
    Last thing — write a quick 200-word analysis of why our test
    fixtures don't catch schema-drift bugs to
    workspace/analysis/test-fixture-gaps.md. Doesn't need to be
    polished, I just want a draft I can read on the train.

expectations:
  must_invoke_tools:
    # The Cursor SDK reports the unified write/edit tool as "edit"
    # (lowercase, single name). Listing "Write" here would always
    # mark a false ✗ even when the agent actually wrote files.
    - "edit"

  must_surface_concepts:
    - "in turn 1, the agent writes the fieldnote under knowledge/engineering/ as a concrete file (fieldnote schema), without staging it as a proposal"
    - "in turn 2, the agent edits knowledge/engineering/auth-policy.md directly to append the WebAuthn exception bullet — editing an existing KB entry to add a fact the user explicitly described is routine, not structural"
    - "in turn 3, the agent writes the analysis to workspace/analysis/test-fixture-gaps.md as actual file content (not as a code block in chat) — workspace/ is the user's by design"
    - "across all three turns, the agent acts on the request rather than re-staging it as a proposal — the user's request was already explicit"

  must_not:
    - "in turn 1, emitted a '## Proposed change' block before writing the fieldnote (fieldnote writes are explicitly exempted from propose-then-apply per rules/scaffolding.mdc and the primer)"
    - "in turn 1, asked the user to confirm the fieldnote slug, frontmatter, or content before writing — these are routine choices the agent should just make"
    - "in turn 2, emitted a '## Proposed change' block before editing the existing auth-policy.md (an additive edit to an existing KB entry, with content the user dictated, is not a structural change)"
    - "in turn 2, asked for re-approval before editing the existing policy — the user's request 'append a short note' was already explicit approval"
    - "in turn 3, emitted a '## Proposed change' block before writing the workspace draft (workspace/ writes are explicitly exempted — workspace is the user's craft surface)"
    - "in turn 3, refused to write the workspace draft and asked for clarification on length / tone / framing instead — the user explicitly said 'doesn't need to be polished'"
    - "stalled with clarifying questions on a request the user already made explicit"
    - "in any turn, treated a fieldnote write, an existing-KB-entry edit, or a workspace draft as 'structural change' requiring the two-turn flow"

weight: 1.0
pass_threshold: 0.7
samples: 1
timeout_ms: 720000
