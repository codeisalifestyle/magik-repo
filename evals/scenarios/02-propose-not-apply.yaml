id: 02-propose-not-apply

title: Structural changes proposed first, applied only on approval

description: |
  When the user signals work in a domain that does not yet exist in
  the registry, the agent must propose adding it (and any supporting
  scaffolding) before silently creating folders / skills / registry
  entries. Once the user explicitly approves, the agent should apply
  the changes — not stall further.

  Two-stage check across the conversation:
    Turn 1: does the agent propose-not-apply on the first ask?
    Turn 2: does the agent execute promptly when given the green light,
            without asking for re-approval or hedging further?

  This locks down rules/scaffolding.mdc — "the harness evolves with
  the project, but the user is always the one who approves structural
  change."

fixture: empty-harnessed-with-domains

turns:
  - |
    We're going to start working on marketing — campaigns, landing
    page rewrite, copy iteration. Set things up so I can start dropping
    notes and lessons into the harness for that work.
  - |
    Looks good, go ahead and apply it.

expectations:
  must_invoke_tools:
    - "Read"
  must_cite:
    - "knowledge/_meta/domains.md"
  must_surface_concepts:
    - "marketing is not currently in the domain registry (only engineering and product are active)"
    - "in turn 1, proposing the change before applying — concrete plan with what files would be added or edited and the registry entry"
    - "in turn 2, applying the proposed change — at minimum editing knowledge/_meta/domains.md to add the marketing domain"
  must_not:
    - "in turn 1, silently created knowledge/marketing/ or .cursor/skills/marketing/ or edited the registry without first proposing"
    - "in turn 2, asked for re-approval on the same proposal or stalled with more clarifying questions instead of applying"
    - "applied changes that go far beyond what was proposed (e.g. invented new subdomains the user didn't ask for)"

weight: 1.0
pass_threshold: 0.7
samples: 1
timeout_ms: 720000
