id: 07-execute-dont-interrupt

title: Agent commits to execution rather than interrupting with a clarifying question

description: |
  Real-world friction reported in v0.7.0+: the agent does setup work
  (reads context, thinks), looks like it's about to execute, then
  invokes Cursor's clarifying-question tool (`AskQuestion` /
  `askQuestion` / equivalent) to ask the user something the codebase
  + KB + conversation could have answered. The cost is doubled — the
  user already waited for the setup, then has to answer a multi-
  choice prompt to unblock.

  The hypothesis (see CHANGELOG v0.7.0+ analysis): the harness's
  always-loaded primer combines three load-bearing phrases —
  "mandatory protocols are non-negotiable", "read the user message
  for what would actually change", "stop and surface the conflict" —
  in a way that shifts the agent's prior toward "when uncertain,
  ask". That instinct is correct for genuinely ambiguous, destructive
  choices and incorrect for routine work where the codebase makes the
  answer obvious.

  Scenario 06 confirmed the formal propose-then-apply protocol is
  scoped correctly. This scenario is the counterpart: it catches the
  *informal* over-asking — `AskQuestion` invocations and conversational
  hedging at the boundary between "I've read enough to start" and
  "let me just start".

  Two turns of clear, bounded coding work where reading the existing
  codebase makes every reasonable default obvious. A confident agent
  reads `codebase/src/auth.ts` + `middleware.ts`, picks defaults that
  match those files' shape, writes the new endpoint file, and only
  THEN mentions any assumptions it made — never as a blocking
  question, always as a "FYI; tell me if wrong".

  Under --control, content-only is expected to also pass (no harness
  → no "be careful" framing → no over-asking instinct). If harnessed
  scores materially below content-only, the harness's prose is
  pushing the agent toward the AskQuestion tool — and Part G of the
  v0.7.0 plan ships.

fixture: populated-kb-with-policy
control_fixture: populated-kb-no-harness

turns:
  - |
    Add a healthz route handler under codebase/src/healthz.ts. Same
    shape as `requireAuth` in middleware.ts — a function that takes
    a request and returns a status object. Response body should be
    `{ status: "ok" }`. Keep it consistent with the existing files'
    style (TypeScript, named export, JSDoc on top).
  - |
    Looks good — also add a 1-line comment above the handler
    explaining what healthz is for.

expectations:
  must_invoke_tools:
    - "edit"

  must_surface_concepts:
    - "in turn 1, the agent reads codebase/src/middleware.ts (and probably auth.ts) to learn the existing convention before writing — the user explicitly invited this"
    - "in turn 1, the agent writes codebase/src/healthz.ts with a TypeScript named export, JSDoc header, and a function body that returns { status: 'ok' } — picking reasonable defaults from what it read, without asking the user to confirm each choice"
    - "in turn 2, the agent edits the healthz.ts file to add a one-line comment above the handler — additive, no clarification needed"
    - "across both turns, when the agent does mention an assumption it made (function name, parameter shape, return type), it does so in narrative form ('I named it `healthz` to match the file') — NOT as a blocking question to the user"

  must_not:
    - "in turn 1, invoked any clarifying-question / ask-the-user tool — `AskQuestion`, `askQuestion`, `ask`, `clarify`, or any equivalent that interrupts execution waiting for a user choice. The fact that the agent did setup work first makes this WORSE, not better — it means the agent already had enough context to commit"
    - "in turn 2, invoked any clarifying-question tool — turn 2 is purely additive, the user's intent is unambiguous"
    - "in turn 1, ended a message with a question that requires the user to answer before the agent can proceed — phrasings like 'should I…?', 'would you like me to…?', 'do you want…?', 'before I proceed, please confirm…', 'which approach do you prefer?' that block execution. A trailing 'let me know if you want me to also do X' AFTER the work is already done is fine; a leading 'before I do this, let me confirm…' that prevents the work from happening is the failure mode"
    - "in turn 1, paused after reading codebase/ to ask which HTTP framework / file path / response shape / function name to use — `requireAuth` in middleware.ts shows the shape, the file path is in the user's request, the response shape is in the user's request, and `healthz` is the obvious function name from the route name"
    - "in turn 2, asked which line the comment should go above, what tone, or what wording — 'a 1-line comment explaining what healthz is for' is fully specified"
    - "stalled by proposing a structural change (this is a code edit inside codebase/, not structural change to the harness — propose-then-apply does not apply here). If the agent emitted a '## Proposed change' block it has misclassified the work"

weight: 1.0
pass_threshold: 0.7
samples: 1
timeout_ms: 720000
