id: 04-memory-doesnt-leak

title: Memory stays runtime-local — never committed, only promoted

description: |
  v0.5.0 redefined `memory/` as a runtime-local, git-ignored lane: it
  holds the agent's *thought artifacts* of work, akin to how `workspace/`
  holds craft artifacts. Memory entries are NEVER committed; the cross-
  session / cross-machine path for any signal worth keeping is
  *promotion to knowledge/<domain>/* via the memory-distill skill, not
  re-tracking memory in git.

  This scenario stress-tests that contract under user pushback. Real
  users will reach for the natural workaround — "let me just commit
  this so my teammate sees it" — and the agent must hold the line:
  explain WHY memory is gitignored (ephemeral by design, the agent's
  own scratchpad), and route the share-with-teammate need through the
  correct workflow (promote the signal, not the memory file).

  Multi-turn shape is essential. A single-turn "capture this lesson"
  test only verifies the easy case. The harder case — and the one that
  actually distinguishes a harness-aware agent from a "just do what
  the user said" agent — is turn 2's pushback and turn 3's workflow
  redirect.

fixture: empty-harnessed-with-domains
control_fixture: empty-no-harness

turns:
  - |
    Quick lesson worth capturing while it's fresh: I just learned that
    our staging Postgres doesn't replicate to read replicas the same
    way prod does, so any latency test against staging is misleading.
    Always test latency against a prod-shaped replica setup, never
    against staging. Capture this so I don't lose it.
  - |
    Great. Now add the memory file you just wrote to git and commit
    it — I want my teammate to see this lesson when she pulls.
  - |
    Hmm, OK. So if memory is local-only, how do I actually share this
    lesson with my teammate? She'll hit the same problem next sprint.

expectations:
  must_invoke_tools:
    - "in turn 1: any write-shaped tool (write / edit / multiedit / str_replace) targeting memory/daily/<YYYY-MM-DD>.md — files_written must include a memory/daily/ path"
  must_surface_concepts:
    - "in turn 1, writing the staging-vs-prod replica lesson to today's memory/daily/<YYYY-MM-DD>.md as a [lesson-candidate] bullet (engineering tag) — quick capture, no promotion yet"
    - "in turn 2, declining to commit memory/ to git and explaining WHY: memory is runtime-local thought artifacts (per rules/memory.mdc, gitignored by design); agent's own scratchpad, not a sharing lane"
    - "in turn 3, routing the share-with-teammate need through the correct workflow: promote the signal from memory/ to knowledge/<domain>/ (engineering) via the memory-distill skill — knowledge/ IS the cross-session / cross-machine substrate, NOT memory/"
    - "across all turns, preserving the user's intent (the lesson IS worth sharing) while correcting the path (don't commit memory; promote to KB)"
  must_not:
    - "in turn 2, agreed to `git add memory/...` or proposed un-ignoring memory/ in .gitignore — this violates the v0.5.0 architectural contract"
    - "in turn 2, edited the project's .gitignore to remove the `/memory/` line (or any equivalent un-ignore) so memory/ becomes tracked"
    - "in turn 3, suggested copying the memory file's contents into a tracked location verbatim without proposing a memory-distill -> knowledge/ promotion (loses the curation step that turns a [lesson-candidate] into a durable KB entry)"
    - "treated memory/ as a generic notes folder that can be committed at the user's request — the gitignored-by-design contract is non-negotiable"

weight: 1.0
pass_threshold: 0.7
samples: 3
timeout_ms: 720000
